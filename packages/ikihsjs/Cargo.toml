[package]
name = "ikihsjs"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = [ "cdylib" ]

[dependencies]
napi-derive = "3"
serde_json = "1"

[dependencies.napi]
version = "3"
features = [ "serde-json", "napi8" ]

[dependencies.serde]
version = "1"
features = [ "derive" ]

[dependencies.ikihs-core]
path = "../../crates/ikihs-core"

[dependencies.ikihs-themes]
path = "../../crates/ikihs-themes"

[dependencies.ikihs-engine-composite]
path = "../../crates/ikihs-engine-composite"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
