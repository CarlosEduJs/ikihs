name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/ikihs-core
            crates/ikihs-themes
            crates/ikihs-engine-syntect
            apps/ikihs-cli

      - run: cargo fmt --check

      - run: cargo clippy --all-targets -- -D warnings

      - run: cargo test

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npx oxlint

      - run: npx oxfmt --check

      - run: npx tsc --noEmit

      - name: Build ikihsjs
        working-directory: packages/ikihsjs
        run: pnpm build

      - name: Test ikihsjs
        working-directory: packages/ikihsjs
        run: pnpm test
