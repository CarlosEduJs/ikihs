name: Publish

# Publishes ikihsjs to npm with multi-platform binaries.
# CLI binary releases are handled by cargo-dist's release.yml.

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - id: version
        run: |
          PUBLISHED=$(npm view ikihsjs version 2>/dev/null || echo "")
          CURRENT=$(node -e "console.log(require('./packages/ikihsjs/package.json').version)")
          if [ "$PUBLISHED" = "$CURRENT" ]; then
            echo "ikihsjs@$CURRENT already published — nothing to do"
            echo "value=" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing ikihsjs@$CURRENT..."
            echo "value=$CURRENT" >> "$GITHUB_OUTPUT"
          fi

  build:
    permissions:
      contents: read
    needs: [check]
    if: needs.check.outputs.version != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            flags: --platform
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            flags: --platform --target aarch64-unknown-linux-gnu
          - target: x86_64-apple-darwin
            runner: macos-latest
            flags: --platform
          - target: aarch64-apple-darwin
            runner: macos-latest
            flags: --platform
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            flags: --platform
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install cross-compilation deps (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          rustup target add aarch64-unknown-linux-gnu

      - name: Build for ${{ matrix.target }}
        run: npx napi build --release ${{ matrix.flags }}
        working-directory: packages/ikihsjs

      - uses: actions/upload-artifact@v4
        with:
          name: ikihsjs-${{ matrix.target }}
          path: packages/ikihsjs/*.node

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          pattern: ikihsjs-*
          path: packages/ikihsjs/
          merge-multiple: true

      - name: Publish
        run: pnpm changelog publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
